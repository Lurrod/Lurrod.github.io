<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page introuvable | Titouan Borde</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,900&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design Tokens (matching portfolio) ─── */
    :root {
      --bg: #08080a;
      --bg-raised: #111114;
      --bg-card: #16161a;
      --text: #eeeef0;
      --text-dim: #7a7a85;
      --text-faint: #44444d;
      --accent: #5eead4;
      --accent-alt: #c084fc;
      --accent-warm: #fb923c;
      --accent-glow: rgba(94, 234, 212, 0.15);
      --accent-glow-strong: rgba(94, 234, 212, 0.35);
      --surface: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.07);
      --border-accent: rgba(94, 234, 212, 0.2);
      --radius: 20px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .light-theme {
      --bg: #f6f5f1;
      --bg-raised: #edece7;
      --bg-card: #ffffff;
      --text: #1a1a1f;
      --text-dim: #6b6b73;
      --text-faint: #b0b0b8;
      --accent: #0d9488;
      --accent-alt: #9333ea;
      --accent-warm: #ea580c;
      --accent-glow: rgba(13, 148, 136, 0.1);
      --accent-glow-strong: rgba(13, 148, 136, 0.25);
      --surface: rgba(0, 0, 0, 0.03);
      --border: rgba(0, 0, 0, 0.07);
      --border-accent: rgba(13, 148, 136, 0.2);
    }

    /* ─── Reset ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-size: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--bg);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    ::selection { background: var(--accent); color: var(--bg); }
    a { color: inherit; text-decoration: none; }

    /* ─── Dot Grid Canvas ─── */
    #dotGrid {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.4;
    }

    .light-theme #dotGrid { opacity: 0.25; }

    /* ─── Grain ─── */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: none;
      opacity: 0.018;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    /* ─── Navigation ─── */
    .topnav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 72px;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(20px, 4vw, 48px);
      background: transparent;
      transition: background 0.4s, backdrop-filter 0.4s, box-shadow 0.4s;
    }

    .topnav.scrolled {
      background: rgba(8, 8, 10, 0.8);
      backdrop-filter: blur(20px) saturate(1.4);
      box-shadow: 0 1px 0 var(--border);
    }

    .light-theme .topnav.scrolled {
      background: rgba(246, 245, 241, 0.85);
    }

    .brand-mark {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.4rem;
      font-style: italic;
      color: var(--accent);
      letter-spacing: -0.03em;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--border-accent);
      border-radius: 12px;
      transition: all 0.3s var(--ease);
    }

    .brand-mark:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-link {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      color: var(--text-dim);
      padding: 8px 16px;
      border-radius: 100px;
      transition: all 0.3s var(--ease);
      position: relative;
      text-decoration: none;
    }

    .nav-link:hover { color: var(--text); }

    .nav-link.active {
      color: var(--accent);
      background: var(--accent-glow);
    }

    .nav-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .lang-btn, .theme-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      transition: all 0.3s var(--ease);
      text-decoration: none;
    }

    .lang-btn:hover, .theme-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .topnav { padding: 0 16px; }
    }

    /* ─── 404 Content ─── */
    .error-container {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .error-content {
      text-align: center;
      max-width: 640px;
    }

    /* Glitch number */
    .error-code {
      font-family: var(--font-mono);
      font-size: clamp(6rem, 18vw, 12rem);
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
      position: relative;
      display: inline-block;
      margin-bottom: 1rem;
      animation: fadeInUp 0.8s var(--ease) both;
    }

    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
    }

    .error-code::before {
      color: var(--accent-alt);
      animation: glitch1 4s infinite;
    }

    .error-code::after {
      color: var(--accent-warm);
      animation: glitch2 4s infinite;
    }

    @keyframes glitch1 {
      0%, 90%, 100% { opacity: 0; transform: translate(0); }
      92% { opacity: 0.7; transform: translate(-4px, 2px); }
      94% { opacity: 0; transform: translate(4px, -2px); }
      96% { opacity: 0.5; transform: translate(2px, 4px); }
      98% { opacity: 0; }
    }

    @keyframes glitch2 {
      0%, 88%, 100% { opacity: 0; transform: translate(0); }
      91% { opacity: 0.5; transform: translate(3px, -3px); }
      93% { opacity: 0; transform: translate(-3px, 3px); }
      95% { opacity: 0.6; transform: translate(-2px, -2px); }
      97% { opacity: 0; }
    }

    /* Decorative line */
    .error-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-alt));
      margin: 1.5rem auto 2rem;
      border-radius: 2px;
      animation: fadeInUp 0.8s var(--ease) 0.15s both;
      position: relative;
    }

    .error-divider::before {
      content: '';
      position: absolute;
      inset: -4px;
      background: linear-gradient(90deg, var(--accent), var(--accent-alt));
      filter: blur(8px);
      opacity: 0.4;
      border-radius: 4px;
    }

    .error-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      font-style: italic;
      margin-bottom: 1rem;
      animation: fadeInUp 0.8s var(--ease) 0.25s both;
    }

    .error-title .accent { color: var(--accent); }

    .error-description {
      font-size: clamp(1rem, 1.5vw, 1.15rem);
      color: var(--text-dim);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      animation: fadeInUp 0.8s var(--ease) 0.35s both;
    }

    /* Path display */
    .error-path {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-faint);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: var(--radius-xs);
      display: inline-block;
      margin-bottom: 2.5rem;
      word-break: break-all;
      animation: fadeInUp 0.8s var(--ease) 0.45s both;
    }

    /* Actions */
    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s var(--ease) 0.55s both;
    }

    .btn-main {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 2rem;
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 100px;
      transition: all 0.4s var(--ease);
      border: none;
      cursor: pointer;
    }

    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--accent-glow-strong);
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 2rem;
      background: transparent;
      color: var(--text);
      font-weight: 500;
      font-size: 0.95rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      transition: all 0.4s var(--ease);
      cursor: pointer;
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── Floating particles ─── */
    .particle {
      position: fixed;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .error-actions {
        flex-direction: column;
        align-items: center;
      }
      .btn-main, .btn-ghost {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- Dot grid canvas -->
  <canvas id="dotGrid"></canvas>

  <!-- Noise grain -->
  <div class="grain"></div>

  <!-- Navigation -->
  <nav class="topnav" id="topnav">
    <a href="/" class="nav-brand">
      <span class="brand-mark">TB</span>
    </a>
    <div class="nav-links">
      <a href="/#accueil" class="nav-link" data-section="accueil">Accueil</a>
      <a href="/#projets" class="nav-link" data-section="projets">Projets</a>
      <a href="/#competences" class="nav-link" data-section="competences">Compétences</a>
      <a href="/#contact" class="nav-link" data-section="contact">Contact</a>
    </div>
    <div class="nav-actions">
      <a href="/en" class="lang-btn" aria-label="Switch to English">EN</a>
      <button id="toggleTheme" class="theme-btn" aria-label="Changer de thème">
        <i class="fas fa-sun"></i>
      </button>
    </div>
  </nav>

  <!-- Floating particles -->
  <div id="particles"></div>

  <!-- 404 Content -->
  <main class="error-container">
    <div class="error-content">
      <div class="error-code">404</div>
      <div class="error-divider"></div>
      <h1 class="error-title">Page <span class="accent">introuvable.</span></h1>
      <p class="error-description">
        La page que vous cherchez a été déplacée, supprimée,
        ou n'a peut-être jamais existé. Pas de panique, repartons sur de bonnes bases.
      </p>
      <div class="error-path" id="errorPath"></div>
      <div class="error-actions">
        <a href="/" class="btn-main">
          <span>Retour à l'accueil</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </a>
        <button class="btn-ghost" onclick="history.back()">
          <span>Page précédente</span>
          <i class="fas fa-rotate-left"></i>
        </button>
      </div>
    </div>
  </main>

  <script>
    /* ─── Display current path ─── */
    document.getElementById('errorPath').textContent = window.location.pathname;

    /* ─── Nav scroll effect ─── */
    const topnav = document.getElementById('topnav');
    window.addEventListener('scroll', () => {
      topnav.classList.toggle('scrolled', window.scrollY > 20);
    });

    /* ─── Theme Toggle ─── */
    const themeBtn = document.getElementById('toggleTheme');
    const icon = themeBtn.querySelector('i');

    function applyTheme(theme) {
      if (theme === 'light') {
        document.body.classList.add('light-theme');
        icon.className = 'fas fa-moon';
      } else {
        document.body.classList.remove('light-theme');
        icon.className = 'fas fa-sun';
      }
    }

    const saved = localStorage.getItem('theme');
    if (saved) applyTheme(saved);

    themeBtn.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light-theme');
      const theme = isLight ? 'light' : 'dark';
      localStorage.setItem('theme', theme);
      icon.className = isLight ? 'fas fa-moon' : 'fas fa-sun';
    });

    /* ─── Dot Grid ─── */
    const canvas = document.getElementById('dotGrid');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      let W, H, cols, rows;
      const spacing = 40;
      const dotBase = 1.2;
      const interactRadius = 150;
      let mouseX = -9999, mouseY = -9999;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cols = Math.ceil(W / spacing) + 1;
        rows = Math.ceil(H / spacing) + 1;
      }

      resize();
      window.addEventListener('resize', resize);

      document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
      document.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });

      function getAccentColor() {
        return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        const accent = getAccentColor();
        for (let c = 0; c < cols; c++) {
          for (let r = 0; r < rows; r++) {
            const x = c * spacing;
            const y = r * spacing;
            const dx = x - mouseX;
            const dy = y - mouseY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const t = Math.max(0, 1 - dist / interactRadius);
            const radius = dotBase + t * 3.5;
            const alpha = 0.12 + t * 0.65;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = t > 0 ? accent : `rgba(${document.body.classList.contains('light-theme') ? '0,0,0' : '255,255,255'}, ${alpha})`;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        }
        requestAnimationFrame(draw);
      }

      draw();
    }

    /* ─── Floating particles ─── */
    const particlesContainer = document.getElementById('particles');
    const particleCount = 12;

    for (let i = 0; i < particleCount; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const size = 2 + Math.random() * 4;
      const dur = 6 + Math.random() * 10;
      const delay = Math.random() * -dur;

      Object.assign(p.style, {
        left: x + '%',
        top: y + '%',
        width: size + 'px',
        height: size + 'px',
        animation: `particleFloat ${dur}s ${delay}s ease-in-out infinite`,
        background: i % 3 === 0 ? 'var(--accent-alt)' : i % 3 === 1 ? 'var(--accent-warm)' : 'var(--accent)',
      });

      particlesContainer.appendChild(p);
    }

    // Inject particle keyframes
    const style = document.createElement('style');
    style.textContent = `
      @keyframes particleFloat {
        0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
        25% { opacity: 0.4; }
        50% { opacity: 0.15; transform: translateY(-40px) scale(1); }
        75% { opacity: 0.3; }
      }
    `;
    document.head.appendChild(style);
  </script>

</body>
</html>
